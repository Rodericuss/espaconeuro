# fly.toml app configuration file generated for espaconeuro on 2026-06-01T16:30:23-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'espaconeuro'
primary_region = 'gru'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/espaco_neuro eval "EspacoNeuro.Release.migrate()"'

[env]
  PHX_HOST = 'espaconeuro.fly.dev'
  PHX_SERVER = 'true'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
